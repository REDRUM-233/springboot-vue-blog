# 开发环境配置
# 激活方式：spring.profiles.active=dev
# 或在 IDE 中设置 Active profiles: dev

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456  # 本地开发可以写死，生产环境绝不

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印 SQL

# JWT 配置（开发环境）
jwt:
  secret: dev-secret-change-in-production
  expiration: 604800000  # 7 天
